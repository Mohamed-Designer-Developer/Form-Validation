<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <!-- the fav icon is here man -->
    <link rel="shortcut icon" href="Javascript.png" type="image/x-icon" />

    <!-- the css link -->
    <link rel="stylesheet" href="Sign up.css" />
  </head>

  <body>
      <h1>Form Validation</h1>
      <!-- <h1>Sign Up</h1> -->
        <p>Learn on your own from top universities and Business around the World</p> 
      <form class="form-control">
        <div class="inputs">
          <div>
            <label for="name">Full Name</label>
          </div>
          <div>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Enter Your Full Name"
            />
          </div>
        </div>
        <div class="inputs">
          <div>
            <label for="email">Email</label>
          </div>
          <div>
            <input
              type="text"
              name="email"
              id="email"
              placeholder="name@gmail.com"
            />
          </div>
        </div>
        <div class="inputs">
          <div>
            <label for="Password">Password</label>
          </div>

          <div>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Create Password"
              class="password"
            />
          </div>

          <span class="hidden">Between 8 and 20 Character</span>

          <div class="confirm-password">
            <label for="Password">Confirm Password</label>
          </div>

          <div>
            <input 
              type="password"
              name="confirm-password"
              id="confirm-password"
              placeholder="Now confirm-password"
              class="confirm-password"
            />
          </div>
        </div>

        <button class="btn-click" type="submit">Join For Free</button>
      </div>
    </form>

    <script src="script.js"></script>
  </body>
</html>
